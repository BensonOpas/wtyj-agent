services:
  agent:
    image: wtyj-agent
    container_name: wtyj-adamus
    restart: unless-stopped
    ports:
      - "8002:8001"
    env_file:
      - ./config/platform.env
    environment:
      - GOOGLE_WORKSPACE_CLI_CREDENTIALS_FILE=/app/config/calendar-key.json
    volumes:
      - ./config:/app/config:rw
      - ./data:/app/data
      - ./logs:/app/logs
