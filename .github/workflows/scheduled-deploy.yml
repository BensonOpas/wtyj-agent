name: Scheduled production deploy (drains queue at off-hours)

on:
  # DEACTIVATED — demo mode, off-hours gate no longer engaged, queue stays
  # empty so scheduled draining is pointless. workflow_dispatch kept so the
  # control panel's "Deploy queued now" button is still wired (no-ops when
  # queue is empty, which is always now). Revert to restore cron before
  # HD Azure onboards.
  # schedule:
  #   - cron: '0,30 * * * *'   # every 30 min, every day
  workflow_dispatch:
    inputs:
      force:
        description: 'Skip off-hours check (emergency deploy)'
        type: boolean
        default: false

jobs:
  drain-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Process queue if off-hours and queue non-empty
        uses: appleboy/ssh-action@v1.2.0
        env:
          FORCE: ${{ github.event_name == 'workflow_dispatch' && inputs.force && 'true' || 'false' }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: FORCE
          command_timeout: 10m
          script: |
            export DEPLOY_QUEUE_PATH=/root/wtyj_deploy_queue.json
            if [ "$FORCE" = "true" ]; then
              export SKIP_OFF_HOURS_CHECK=1
              echo "Emergency deploy — skipping off-hours check"
            fi
            chmod +x /root/wtyj/scripts/*.sh
            bash /root/wtyj/scripts/process_deploy_queue.sh
