[supervisord]
nodaemon=true
logfile=/app/logs/supervisord.log
logfile_maxbytes=10MB
pidfile=/tmp/supervisord.pid

[program:email-poller]
command=python3 -m agents.marina.email_poller
directory=/app
autostart=true
autorestart=unexpected
exitcodes=0
startsecs=0
startretries=3
redirect_stderr=true
stdout_logfile=/app/logs/email_poller.log
stdout_logfile_maxbytes=10MB

[program:webhook-server]
command=uvicorn agents.social.webhook_server:app --host 0.0.0.0 --port 8001
directory=/app
autostart=true
autorestart=true
startsecs=5
startretries=3
redirect_stderr=true
stdout_logfile=/app/logs/webhook_server.log
stdout_logfile_maxbytes=10MB

[program:hold-reaper]
command=python3 -m agents.marina.hold_reaper
directory=/app
autostart=true
autorestart=unexpected
exitcodes=0
startsecs=0
startretries=3
redirect_stderr=true
stdout_logfile=/app/logs/hold_reaper.log
stdout_logfile_maxbytes=10MB
